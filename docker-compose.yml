services:
  db:
    image: postgres:16-alpine
    container_name: biblioteca-db
    environment:
      POSTGRES_DB: biblioteca
      POSTGRES_USER: biblioteca
      POSTGRES_PASSWORD: biblioteca
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblioteca -d biblioteca"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: biblioteca-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker,seed
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/biblioteca
      SPRING_DATASOURCE_USERNAME: biblioteca
      SPRING_DATASOURCE_PASSWORD: biblioteca
      LOAN_DAYS: 14
      TZ: UTC
    ports:
      - "8080:8080"

volumes:
  pgdata:
