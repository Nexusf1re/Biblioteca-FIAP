spring:
  application:
    name: biblioteca-online
  # Perfil padrao: H2 em memoria (desenvolvimento local sem dependencias externas).
  # Para PostgreSQL/Docker use o perfil "docker" (application-docker.yml).
  datasource:
    url: jdbc:h2:mem:biblioteca;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        order_inserts: true
        order_updates: true
        jdbc:
          time_zone: UTC
          batch_size: 50
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# Parametros de negocio (sobrescritiveis por variavel de ambiente)
biblioteca:
  emprestimo:
    dias-prazo: ${LOAN_DAYS:14}
  reserva:
    dias-expiracao: ${RESERVATION_EXPIRATION_DAYS:3}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
